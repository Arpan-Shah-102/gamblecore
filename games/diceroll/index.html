<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dice Roll - Gamblecore</title>
        <link rel="stylesheet" href="../../css/components.css">
        <link rel="stylesheet" href="./style.css">
        <link rel="icon" href="../assets/diceroll.png">
    </head>

    <body>
        <header>
            <h1>Dice Duel</h1>
        </header>
        <div class="money-label top-label">
            <p>$1,000.00</p>
        </div>
        <div class="menu-btn top-label">
            <p>Menu</p>
        </div>

        <main>
            <section class="game-section">
                <div class="dices">
                    <div class="section player">
                        <h3>Your<br>Role</h3>
                        <h2 class="die"><span class="dice-1 player-die">⚅</span><span class="dice-2 player-die">⚅</span></h2>
                        <p class="result player-score">00</p>
                    </div>
                    <div class="section computer">
                        <h3>Computer's<br>Role</h3>
                        <h2 class="die"><span class="dice-1 computer-die">⚅</span><span class="dice-2 computer-die">⚅</span></h2>
                        <p class="result computer-score">00</p>
                    </div>
                </div>
                <label>Bet Amount: <input class="bet-amount" type="number" max="1000" min="1" value="10"></label>
                <button class="roll-btn blue">Roll</button>
            </section>

            <section class="game-feature-section gamemodes">
                <h2>Select Gamemode</h2>
                <select class="gamemode-select">
                    <option value="classic">Classic 🎲</option>
                    <option disabled value="pig">Pig 🐷</option>
                    <option disabled value="blackjack">Blackjack 🃏</option>
                    <option disabled value="race">Race 🎯</option>
                </select>
                <div class="block gamemode-purchase-cont basic-cont">
                    <div class="gamemode-row basic-row over-under">
                        <abbr title="First to roll two 1s loses!">
                            <h2>Pig</h2>
                            <button class="red buy" data-index="1" value="pig" data-price="100">$100.00</button>
                        </abbr>
                    </div>
                    <div class="gamemode-row basic-row blackjack">
                        <abbr title="Get closer to 21 than the AI!">
                            <h2>Blackjack</h2>
                            <button class="red buy" data-index="2" value="blackjack" data-price="200">$200.00</button>
                        </abbr>
                    </div>
                    <div class="gamemode-row basic-row odd-or-even">
                        <abbr title="Get to 100 points before the AI!">
                            <h2>Race</h2>
                            <button class="red buy" data-index="3" value="race" data-price="300">$300.00</button>
                        </abbr>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p></p>
            <script>
                const year = new Date().getFullYear();
                document.querySelector('footer p').innerHTML = `&copy; ${year} Arpan Shah. All rights reserved.`;
            </script>
        </footer>

        <div class="mute-btn setting">
            <abbr title="Sound is on">
                <img src="../../assets/sound-on.svg" alt="Mute">
            </abbr>
        </div>
        <div class="change-theme setting">
            <abbr title="Change Theme">
                <img src="../../assets/switch-theme.svg" alt="Change Theme">
            </abbr>
        </div>
        <div class="practice-mode setting">
            <abbr title="Practice mode is off">
                <img src="../../assets/practice-mode-off.svg" alt="Practice Mode">
            </abbr>
        </div>

        <div class="game-locked diceroll">
            <div class="inner-body">
                <h2>You do not own this game</h2>
                <p>This game is locked. Please unlock it from the main menu or from here to play.</p>
                <button class="close-locked-btn green">Menu</button>
                <button class="unlock-game-with-locked red">$1,200</button>
            </div>
        </div>
        
        <script src="../../js/utils.js"></script>
        <script src="../functions.js"></script>
        <script src="./script.js"></script>
    </body>
</html>
