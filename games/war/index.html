<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>War - Gamblecore</title>
        <link rel="stylesheet" href="../../css/components.css">
        <link rel="stylesheet" href="./style.css">
        <link rel="icon" href="../assets/war.png">
    </head>

    <body>
        <header>
            <h1>War</h1>
        </header>
        <div class="money-label top-label">
            <p>$1,000.00</p>
        </div>
        <div class="menu-btn top-label">
            <p>Menu</p>
        </div>

        <main>
            <section class="game-section">
                <div class="cards">
                    <div class="card-section">
                        <h2>Your Card</h2>
                        <div class="card-thing">
                            <h1 class="card">🂠</h1>
                        </div>
                    </div>
                    <div class="card-section">
                        <h2>Computer's Card</h2>
                        <div class="card-thing">
                            <h1 class="card">🂠</h1>
                        </div>
                    </div>
                </div>
                <label>Bet Amount: <input class="bet-amount" type="number" max="1000" min="1" value="10"></label>
                <button class="blue draw">Draw Card</button>
            </section>

            <section class="game-feature-section upgrades">
                <h2>Upgrades</h2>
                <div class="upgrade-options block">
                    <div class="upgrade-option container player">
                        <h3>Improve Your Hand</h3>
                        <p class="level player">Lvl 0</p>
                        <button class="buy green upgrade player">$150.00</button>
                    </div>
                    <div class="upgrade-option container computer">
                        <h3>Sabotage Computer's Hand</h3>
                        <p class="level computer">Lvl 0</p>
                        <button class="buy green upgrade computer">$150.00</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p></p>
            <script>
                const year = new Date().getFullYear();
                document.querySelector('footer p').innerHTML = `&copy; ${year} Arpan Shah. All rights reserved.`;
            </script>
        </footer>

        <div class="mute-btn setting">
            <abbr title="Sound is on">
                <img src="../../assets/sound-on.svg" alt="Mute">
            </abbr>
        </div>
        <div class="change-theme setting">
            <abbr title="Change Theme">
                <img src="../../assets/switch-theme.svg" alt="Change Theme">
            </abbr>
        </div>
        <div class="practice-mode setting">
            <abbr title="Practice mode is off">
                <img src="../../assets/practice-mode-off.svg" alt="Practice Mode">
            </abbr>
        </div>

        <div class="game-locked war">
            <div class="inner-body">
                <h2>You do not own this game</h2>
                <p>This game is locked. Please unlock it from the main menu or from here to play.</p>
                <button class="close-locked-btn green">Menu</button>
                <button class="unlock-game-with-locked red">$50</button>
            </div>
        </div>
        
        <script src="../../js/utils.js"></script>
        <script src="../functions.js"></script>
        <script src="./script.js"></script>
    </body>
</html>
